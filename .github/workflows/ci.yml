name: CI

on:
  push:
    branches: [main, release-please--branches--main--components--wopr]
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  lint-and-check:
    name: Lint and Type Check
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint and type check
        run: pnpm check

  test:
    name: Test
    runs-on: [self-hosted, Linux, X64]
    needs: lint-and-check
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test -- --coverage

      - name: Coverage Report
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: coverage/coverage-summary.json

  build:
    name: Build
    runs-on: [self-hosted, Linux, X64]
    needs: lint-and-check
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 1

  validate:
    name: Validate Build
    runs-on: [self-hosted, Linux, X64]
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: Download dist artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Install production dependencies
        run: pnpm install --frozen-lockfile --prod

      - name: Ensure dist/cli.js exists
        run: |
          if [ ! -f dist/cli.js ]; then
            echo "Error: dist/cli.js not found"
            exit 1
          fi
          echo "✓ dist/cli.js exists"

      - name: Ensure dist/daemon/index.js exists
        run: |
          if [ ! -f dist/daemon/index.js ]; then
            echo "Error: dist/daemon/index.js not found"
            exit 1
          fi
          echo "✓ dist/daemon/index.js exists"

      - name: Verify CLI works
        run: |
          node dist/cli.js --help
          echo "CLI executed successfully"

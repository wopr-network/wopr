name: Mirror Base Images

on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday
  workflow_dispatch:

permissions:
  packages: write
  contents: read

jobs:
  mirror:
    name: Mirror ${{ matrix.source }}
    runs-on: [self-hosted, Linux, X64]
    strategy:
      matrix:
        include:
          - source: node:24-bookworm-slim
            target: ghcr.io/wopr-network/base/node:24-bookworm-slim

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Mirror image
        run: |
          docker buildx imagetools create --tag "${{ matrix.target }}" "${{ matrix.source }}"
          echo "Mirrored ${{ matrix.source }} → ${{ matrix.target }}"

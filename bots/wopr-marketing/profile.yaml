name: wopr-marketing
description: WOPR's own marketing bot — dogfooding the platform as the marketing team

release_channel: stable
update_policy: nightly

plugins:
  channels: [discord]
  providers: [anthropic]
  voice: []
  other: [memory-semantic]

resources:
  memory: 512m
  restart: unless-stopped

volumes:
  persist: true

health:
  check: true
  alert_on_failure: true
